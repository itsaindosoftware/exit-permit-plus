<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" fill="none">
  <defs>
    <style>
      .l { stroke:#111; stroke-width:2; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .t { font-family:"Courier New", monospace; font-size:12px; fill:#111; }
      .th { font-family:"Courier New", monospace; font-size:36px; font-weight:700; fill:#111; }
      .ts { font-family:"Courier New", monospace; font-size:10px; fill:#111; }
    </style>
  </defs>

  <rect x="6" y="6" width="1268" height="788" class="l"/>

  <!-- Top bar -->
  <rect x="6" y="6" width="1268" height="24" class="l"/>
  <text x="620" y="22" class="t">Exit Permit Form</text>
  <rect x="912" y="8" width="114" height="18" rx="3" class="l"/>
  <circle cx="924" cy="17" r="6" class="l"/>
  <text x="936" y="21" class="ts">Wida Mustika Sari</text>

  <!-- Main panel -->
  <rect x="354" y="40" width="592" height="34" rx="4" class="l"/>
  <text x="362" y="61" class="ts">Dokumen ini menunggu approval Manager. Jika approve, akan lanjut ke MD.</text>

  <rect x="354" y="86" width="592" height="672" rx="8" class="l"/>
  <rect x="354" y="86" width="592" height="42" class="l"/>
  <text x="594" y="102" class="ts">OFFICIAL DOCUMENT</text>
  <text x="578" y="120" class="th" style="font-size:34px;">EXIT PERMIT FORM</text>

  <!-- Section 1 -->
  <rect x="354" y="128" width="592" height="16" class="l"/>
  <rect x="354" y="128" width="18" height="16" class="l"/>
  <text x="360" y="139" class="ts">1</text>
  <text x="380" y="139" class="ts">FOR REQUESTOR</text>

  <!-- Requestor table -->
  <rect x="366" y="156" width="568" height="60" class="l"/>
  <line x1="366" y1="174" x2="934" y2="174" class="l"/>
  <line x1="392" y1="156" x2="392" y2="216" class="l"/>
  <line x1="492" y1="156" x2="492" y2="216" class="l"/>
  <line x1="598" y1="156" x2="598" y2="216" class="l"/>
  <line x1="702" y1="156" x2="702" y2="216" class="l"/>
  <line x1="806" y1="156" x2="806" y2="216" class="l"/>
  <text x="372" y="169" class="ts">NO</text>
  <text x="402" y="169" class="ts">NAME</text>
  <text x="502" y="169" class="ts">EMPLOYEE ID</text>
  <text x="608" y="169" class="ts">POSITION</text>
  <text x="712" y="169" class="ts">DEPARTMENT</text>
  <text x="816" y="169" class="ts">LUNCH (Y/N)</text>

  <rect x="366" y="224" width="568" height="22" rx="4" class="l"/>
  <text x="372" y="238" class="ts">Data requestor tersimpan ke database dan dapat diubah selama request masih pending.</text>
  <rect x="838" y="228" width="48" height="14" rx="3" class="l"/>
  <text x="844" y="238" class="ts">+Tambah</text>
  <rect x="890" y="228" width="42" height="14" rx="3" class="l"/>
  <text x="894" y="238" class="ts">Hapus</text>

  <!-- Date + Reason -->
  <rect x="366" y="256" width="568" height="48" rx="4" class="l"/>
  <line x1="650" y1="256" x2="650" y2="304" class="l"/>
  <text x="372" y="270" class="ts">1.2 Request permit date</text>
  <rect x="372" y="278" width="272" height="18" rx="3" class="l"/>
  <text x="656" y="270" class="ts">Reason</text>
  <rect x="656" y="278" width="126" height="18" rx="3" class="l"/>
  <rect x="786" y="278" width="142" height="18" rx="3" class="l"/>

  <!-- Destination -->
  <text x="366" y="320" class="ts">Destination</text>
  <rect x="366" y="324" width="568" height="18" rx="3" class="l"/>

  <!-- Time -->
  <text x="366" y="360" class="ts">Exit from factory on time</text>
  <text x="554" y="360" class="ts">Plan back time</text>
  <rect x="366" y="364" width="182" height="18" rx="3" class="l"/>
  <rect x="554" y="364" width="182" height="18" rx="3" class="l"/>
  <rect x="742" y="364" width="192" height="32" rx="4" class="l"/>
  <rect x="750" y="373" width="8" height="8" rx="2" class="l"/>
  <text x="764" y="379" class="ts">Comeback to factory today</text>

  <!-- Order car -->
  <text x="366" y="412" class="ts">1.3 Order Car</text>
  <rect x="372" y="416" width="22" height="14" rx="3" class="l"/>
  <text x="378" y="426" class="ts">Yes</text>
  <rect x="398" y="416" width="22" height="14" rx="3" class="l"/>
  <text x="404" y="426" class="ts">No</text>
  <rect x="366" y="438" width="568" height="28" rx="4" class="l"/>
  <text x="372" y="452" class="ts">No. Polisi: B 1120 NZX   |   Supir: Aldin Kertayasa</text>

  <!-- Reason detail -->
  <text x="366" y="484" class="ts">1.5 Detail the reasons</text>
  <rect x="366" y="488" width="568" height="48" rx="3" class="l"/>

  <!-- Attachment -->
  <text x="366" y="554" class="ts">Attachment Foto (Opsional, Max 2MB)</text>
  <text x="366" y="566" class="ts">File saat ini: WhatsApp Image...</text>
  <rect x="366" y="572" width="568" height="20" rx="3" class="l"/>

  <!-- Warning -->
  <rect x="366" y="612" width="568" height="22" rx="4" class="l"/>
  <text x="372" y="626" class="ts">Please fill in properly, this document is attachment for gasoline, toll, parking and lunch reimbursement.</text>

  <!-- Section 2 -->
  <rect x="354" y="644" width="592" height="16" class="l"/>
  <rect x="354" y="644" width="18" height="16" class="l"/>
  <text x="360" y="655" class="ts">2</text>
  <text x="380" y="655" class="ts">SPECIAL FULFILL BY SECURITY</text>
  <rect x="366" y="672" width="278" height="36" rx="4" class="l"/>
  <rect x="656" y="672" width="278" height="36" rx="4" class="l"/>
  <text x="372" y="687" class="ts">2.1 Exit from factory time</text>
  <text x="662" y="687" class="ts">2.2 Comeback to factory time</text>

  <!-- Footer buttons -->
  <rect x="804" y="732" width="42" height="20" rx="4" class="l"/>
  <text x="814" y="746" class="ts">Kembali</text>
  <rect x="850" y="732" width="36" height="20" rx="4" class="l"/>
  <text x="858" y="746" class="ts">Reject</text>
  <rect x="890" y="732" width="44" height="20" rx="4" class="l"/>
  <text x="898" y="746" class="ts">Approve</text>

  <text x="12" y="792" class="ts">Wireframe edit exit permit (approval mode) - low fidelity black/white sketch</text>
</svg>
