<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="800" viewBox="0 0 1600 800" fill="none">
  <defs>
    <style>
      .line { stroke: #111; stroke-width: 2; fill: none; }
      .thin { stroke: #111; stroke-width: 1.3; fill: none; }
      .txt { font-family: "Courier New", monospace; font-size: 16px; fill: #111; }
      .txt-sm { font-family: "Courier New", monospace; font-size: 13px; fill: #111; }
      .title { font-family: "Courier New", monospace; font-size: 30px; font-weight: 700; fill: #111; }
    </style>
  </defs>

  <!-- Outer frame -->
  <rect x="12" y="12" width="1576" height="776" class="line" />

  <!-- Sidebar -->
  <rect x="20" y="20" width="230" height="760" class="line" />
  <line x1="20" y1="130" x2="250" y2="130" class="thin" />

  <!-- Sidebar logo/title block -->
  <text x="35" y="50" class="txt-sm">INTERNAL SYSTEM</text>
  <text x="35" y="78" class="txt">Exit Permit+</text>
  <text x="35" y="102" class="txt-sm">Operational Management Portal</text>

  <!-- Sidebar menu -->
  <rect x="30" y="164" width="210" height="32" class="line" />
  <text x="42" y="186" class="txt-sm">Dashboard</text>

  <text x="42" y="226" class="txt-sm">Exit Permit</text>
  <text x="42" y="266" class="txt-sm">Reimbursement</text>
  <text x="42" y="306" class="txt-sm">Profile</text>

  <!-- Sidebar user card -->
  <rect x="30" y="346" width="210" height="96" class="line" />
  <circle cx="62" cy="378" r="18" class="line" />
  <text x="86" y="372" class="txt-sm">Indri</text>
  <text x="86" y="392" class="txt-sm">indri@example.com</text>
  <rect x="42" y="402" width="42" height="18" class="line" />
  <text x="50" y="416" class="txt-sm">USER</text>

  <!-- Top bar -->
  <rect x="250" y="20" width="1338" height="54" class="line" />
  <text x="486" y="53" class="txt">Dashboard</text>
  <rect x="1340" y="28" width="150" height="38" class="line" />
  <circle cx="1363" cy="47" r="12" class="line" />
  <text x="1382" y="52" class="txt-sm">Indri</text>
  <polyline points="1440,45 1446,45 1443,50" class="thin" />

  <!-- Main content area -->
  <rect x="250" y="74" width="1338" height="706" class="line" />

  <!-- Cards row -->
  <rect x="486" y="102" width="240" height="100" class="line" />
  <text x="505" y="132" class="txt-sm">Total Exit Permit</text>
  <text x="505" y="174" class="title">7</text>

  <rect x="746" y="102" width="240" height="100" class="line" />
  <text x="765" y="132" class="txt-sm">Total Reimbursement Approved</text>
  <text x="765" y="174" class="title">Rp 498.000</text>

  <!-- Sketch effect lines -->
  <line x1="31" y1="164" x2="239" y2="164" class="thin" />
  <line x1="487" y1="102" x2="724" y2="102" class="thin" />
  <line x1="747" y1="102" x2="984" y2="102" class="thin" />

  <!-- Footer annotation -->
  <text x="28" y="772" class="txt-sm">Wireframe (Low Fidelity) - black/white sketch</text>
</svg>
